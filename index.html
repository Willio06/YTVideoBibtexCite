<body>
  <div class="container">
    <div class="card">
      <h1>YouTube BibTeX Citation</h1>
      <p class="subtitle">Generate citations for your videos</p>
      
      <div class="form-group">
        <label for="video">Video URL</label>
        <input type="text" id="video" class="input-large" placeholder="https://youtube.com/watch?v=..." />
      </div>
      
      <div class="form-group">
        <label for="key">Citation Key (optional)</label>
        <input type="text" id="key" class="input-small" placeholder="e.g., MyVideo2024" />
      </div>
      
      <div class="form-group">
        <label>Fields to include</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="fields" value="title" checked> Title</label>
          <label><input type="checkbox" name="fields" value="author" checked> Author</label>
          <label><input type="checkbox" name="fields" value="year" checked> Year</label>
          <label><input type="checkbox" name="fields" value="url" checked> URL</label>
          <label><input type="checkbox" name="fields" value="accessed" checked> Accessed</label>
          <label><input type="checkbox" name="fields" value="abstract"> Description</label>
          <label><input type="checkbox" name="fields" value="month"> Month</label>
          <label><input type="checkbox" name="fields" value="date"> Date</label>
          <label><input type="checkbox" name="fields" value="length"> Length</label>
          <label><input type="checkbox" name="fields" value="series"> Playlist</label>
        </div>
      </div>
      
      <button class="btn-generate" onclick="generate()">Generate Citation</button>
      
      <div class="output-section" id="outputSection" style="display: none;">
        <div class="output-header">
          <h3>Citation</h3>
          <button class="btn-copy" onclick="copyToClipboard(this)">Copy to Clipboard</button>
        </div>
        <pre id="result" class="result-box"></pre>
      </div>
  </div>
  
  <div class="disclaimer">
    Disclaimer! This app is not responsible for your bad referencing, if applicable.
  </div>
  
  <script src="scripts.js"></script>
