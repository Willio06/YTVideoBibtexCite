<!DOCTYPE html>
<html>
<head>
  <title>YT video BibTeX Cite</title>
  <meta charset="UTF-8">
  <!-- <meta name="description" content="A glorified alarm clock for finite time intervals.">
  <meta name="keywords" content="Tuur Willio, Finite Time, glorified clock, alarm clock, timer, time management"> -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link author="Tuur Willio" href="mailto:tuur.willio@gmail.com">
  <meta name="description" content="Turn any YouTube video into a properly formatted BibTeX citation.">
  <meta name="keywords" content="BibTeX, YouTube, citation generator, academic referencing, video citation, research tools, Tex, LaTeX, bibliography management, scholarly resources, youtube citation, bibtex generator, academic writing, research citation, video bibliography, citation management, scholarly communication, video cite, academic resources, youtube bibtex, research tools, citation software, video referencing, scholarly tools, youtube citation generator">
  <meta name="google-site-verification" content="aO9n1tdyBRL8Yz7nlaTHOchlgll9Yk9G3V709McR_pA" />
  <link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
<link rel="shortcut icon" href="/icons/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="YT BibTeX Cite" />
<link rel="manifest" href="/icons/site.webmanifest" />
  <link rel="stylesheet" href="style.css">
    <link rel="canonical" href="https://ytvideobibtexcite.pages.dev/" />
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>YouTube BibTeX Citation</h1>
      <p class="subtitle">Generate citations for your videos</p>
      
      <div class="form-group">
        <label for="video">Video URL</label>
        <input type="text" id="video" class="input-large" placeholder="https://youtube.com/watch?v=..." />
      </div>
      
      <div class="form-group">
        <label for="key">Citation Key (optional)</label>
        <input type="text" id="key" class="input-small" placeholder="e.g., MyVideo2024" />
      </div>
      
      <div class="form-group">
        <label>Fields to include</label>
        <div class="checkbox-group">
          <label><input type="checkbox" name="fields" value="title" checked> Title</label>
          <label><input type="checkbox" name="fields" value="author" checked> Author</label>
          <label><input type="checkbox" name="fields" value="year" checked> Year</label>
          <label><input type="checkbox" name="fields" value="url" checked> URL</label>
          <label><input type="checkbox" name="fields" value="accessed" checked> Accessed</label>
          <label><input type="checkbox" name="fields" value="abstract"> Description</label>
          <label><input type="checkbox" name="fields" value="month"> Month</label>
          <label><input type="checkbox" name="fields" value="date"> Date</label>
          <label><input type="checkbox" name="fields" value="length"> Length</label>
          <label><input type="checkbox" name="fields" value="series"> Playlist</label>
        </div>
      </div>
      
      <button class="btn-generate" onclick="generate()">Generate Citation</button>
      
      <div class="output-section" id="outputSection" style="display: none;">
        <div class="output-header">
          <h3>Citation</h3>
          <button class="btn-copy" onclick="copyToClipboard(this)">Copy to Clipboard</button>
        </div>
        <pre id="result" class="result-box"></pre>
      </div>
  </div>
  
  <div class="disclaimer">
    Disclaimer! This app is not responsible for your bad referencing, if applicable.
  </div>
  
  <script src="scripts.js"></script>
</body>
</html>
